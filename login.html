<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turbo TR - Giriş Yap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3" href="index.html">Turbo TR</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Ana Sayfa</a></li>
          <li class="nav-item"><a class="nav-link" href="notlarim.html">Notlarım</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html">Giriş Yap</a></li>
          <li class="nav-item"><a class="nav-link" href="kayit.html">Kayıt Ol</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card p-4 shadow-sm border-secondary">
          <h3 class="text-center mb-4 fw-bold">Giriş Yap</h3>
          <form id="auth-form">
            <div class="mb-3">
              <label for="email" class="form-label">E-Posta</label>
              <input type="text" class="form-control" id="email" placeholder="ornek@mail.com">
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Şifre</label>
              <input type="password" class="form-control" id="password" placeholder="En az 6 karakter">
            </div>
            <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
          </form>
          <div class="mt-3 text-center">
            <small>Hesabınız yok mu? <a href="kayit.html" class="text-decoration-none text-primary">Kayıt Ol</a></small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center py-4 mt-5">
    <div class="container border-top border-secondary pt-3">
      <p class="mb-0" style="color: var(--text-color);">&copy; 2026 Turbo TR. Tüm Hakları Saklıdır.</p>
    </div>
  </footer>

  <button id="theme-toggle" class="btn btn-secondary">🌙 Koyu Tema</button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
